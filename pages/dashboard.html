<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarinaFit Pro</title>
    <link rel="stylesheet" href="../css/app.css?v=2">
</head>
<body>

<div class="app">

    <header class="topbar">
        <div class="topbar-content">
            <div>
                <h1>MarinaFit Pro</h1>
                <p>Seu centro de comando fitness</p>
            </div>
            <div class="avatar" id="avatarInitial">M</div>
        </div>
    </header>

    <div id="welcomeCard" class="welcome-card"></div>

    <section class="hero-card">
        <span class="badge">Nível Iniciante</span>
        <h2>Seu próximo treino está pronto</h2>
        <p>Fortalecimento · Mobilidade · Calistenia</p>
        <button class="primary-btn">▶ Iniciar Treino</button>
    </section>

    <section class="stats">
        <div class="stat-card">
            <h3>Treinos</h3>
            <span>0</span>
        </div>
        <div class="stat-card">
            <h3>Peso</h3>
            <span id="statPeso">--</span>
        </div>
        <div class="stat-card">
            <h3>Meta</h3>
            <span id="statMeta">--</span>
        </div>
    </section>

    <section class="quick-actions">
        <h2>Módulos</h2>
        <div class="action-grid">
            <a href="avaliacao.html" class="action-card">
                <span class="action-icon">📋</span>
                <span class="action-label">Avaliação
