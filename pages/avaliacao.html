<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Física · MarinaFit Pro</title>
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>

<div class="app">

    <a href="dashboard.html" class="back-link">← Voltar</a>

    <div class="page-header">
        <h1>Avaliação Física</h1>
        <p>Preencha seus dados para personalizar os treinos</p>
    </div>

    <form id="assessmentForm">

        <div class="form-card">
            <h3>Dados Pessoais</h3>

            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Seu nome" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Idade</label>
                    <input type="number" id="idade" placeholder="Anos">
                </div>
                <div class="form-group">
                    <label>Peso (kg)</label>
                    <input type="number" id="peso" placeholder="kg" step="0.1">
                </div>
            </div>

            <div class="form-group">
                <label>Altura (cm)</label>
                <input type="number" id="altura" placeholder="cm">
            </div>
        </div>

        <div class="form-card">
            <h3>Objetivo Principal</h3>
            <div class="form-group">
                <select id="objetivo">
                    <option value="">Selecione seu objetivo</option>
                    <option value="Definição">Definição muscular</option>
                    <option value="Força">Ganho de força</option>
                    <option value="Condicionamento">Condicionamento físico</option>
                </select>
            </div>
        </div>

        <div class="form-card">
            <h3>Limitações Físicas</h3>
            <p style="color:#6B7280;font-size:13px;margin-bottom:16px;">Selecione as áreas que precisam de atenção especial</p>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="lombar">
                    <span>🔴 Região lombar</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="joelho">
                    <span>🟡 Joelhos</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="tornozelo">
                    <span>🟢 Tornozelos</span>
                </label>
            </div>
        </div>

        <button type="submit" class="submit-btn">Salvar Avaliação</button>

    </form>

    <div id="resultado"></div>

</div>

<script src="../js/storage.js"></script>

</body>
</html>
